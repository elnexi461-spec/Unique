<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>UOU Infinite</title>
  <script>
    // SPA redirect trick for GitHub Pages.
    // When GH Pages returns a 404 for a deep path like /student/guardian,
    // this page encodes the path into a query param and redirects to root,
    // where index.html decodes it and pushes to the browser history
    // so the SPA router picks it up seamlessly.
    //
    // segmentsToKeep = 0  →  custom domain  (base = "/")
    // segmentsToKeep = 1  →  standard GH URL (base = "/repo-name/")
    var segmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') +
      '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/')
        .replace(/&/g, '~and~') +
      (l.search
        ? '&q=' + l.search.slice(1).replace(/&/g, '~and~')
        : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>

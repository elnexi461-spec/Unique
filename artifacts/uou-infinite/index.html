    <script>
      // Restore path encoded by 404.html (GitHub Pages SPA routing)
      (function () {
        var m = /[?&]p=(\/[^&]*)/.exec(window.location.search);
        if (m) {
          var path  = decodeURIComponent(m[1].replace(/~and~/g, '&'));
          var query = window.location.search
            .replace(/[?&]p=\/[^&]*/,  '')
            .replace(/[?&]q=([^&]*)/, function (_, q) {
              return '?' + decodeURIComponent(q.replace(/~and~/g, '&'));
            })
            .replace(/^&/, '?');
          window.history.replaceState(
            null, null,
            path + query + window.location.hash
          );
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
